name: Code format

permissions:
  contents: read

on:
  push:
    branches: [main]
    paths:
      - '*.c'
      - '.clang-format'
      - '.github/workflows/code-format.yml'
  pull_request:
    paths:
      - '*.c'
      - '.clang-format'
      - '.github/workflows/code-format.yml'

jobs:
  clang-format:
    name: clang-format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run clang-format style check
        uses: jidicula/clang-format-action@v4.16.0
        with:
          clang-format-version: '19'
